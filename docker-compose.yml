version: '3.8'

services:
  # 1. Service Database PostgreSQL
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dev_adhi
      POSTGRES_PASSWORD: Jakarta191004
      POSTGRES_DB: health_plan_app
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 2. Service AI Python
  ai-api:
    build: 
      context: ./ai-api
    ports:
      - "8000:8000"
    volumes:
      - ./ai-api:/app # <-- INI TETAP, UDAH BENAR!

  # 3. Service Backend Node.js
  backend-api:
    build: 
      context: ./back-end
    ports:
      - "3000:3000"
    volumes:
      - ./back-end:/app
      - /app/node_modules
      # --- UPDATE BARIS INI ---
      # Memetakan folder artifacts baru ke folder lama yang dibaca oleh Node.js
      - ./ai-api/app/artifacts:/ai-service/artifacts
    command: npm run start:dev
    environment:
      DB_USER: dev_adhi
      DB_PASSWORD: Jakarta191004
      DB_HOST: database
      DB_NAME: health_plan_app
      DB_PORT: 5432
    depends_on:
      - database
      - ai-api

  # 4. Service Frontend React/Vite
  frontend-app:
    build:
      context: ./front-end
    ports:
      - "5173:5173"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000/api/v1
    depends_on:
      - backend-api

volumes:
  pg_data: